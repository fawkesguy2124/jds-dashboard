<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDS — Employee Portal</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--border:#e2e8f0;--text:#1a202c;--text2:#4a5568;--text3:#94a3b8;--blue:#2563eb;--blue2:#1d4ed8;--green:#16a34a;--amber:#d97706;--red:#dc2626;--r:8px;--r2:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
button,select,input,textarea{font-family:inherit;font-size:13px}
.header{background:var(--blue);color:#fff;padding:0 1.25rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.hlogo{display:flex;align-items:center;gap:10px}
.hbox{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.htitle{font-size:14px;font-weight:700}
.hsub{font-size:10px;opacity:.7}
.who-bar{background:#fff;border-bottom:1px solid var(--border);padding:.6rem 1.25rem;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);flex-wrap:wrap}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 1.25rem;overflow-x:auto}
.tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--blue)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.wrap{max-width:900px;margin:0 auto;padding:1.25rem}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:1rem}
.ch{padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:14px;font-weight:600;color:var(--text)}
.cb{padding:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:580px){.form-grid{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:700;color:var(--text2)}
.fg .who{font-size:10px;color:var(--text3);font-weight:400;background:#f1f5f9;padding:1px 6px;border-radius:10px;margin-left:5px}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;width:100%;background:#fff;color:var(--text);transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg textarea{resize:vertical;min-height:65px}
.fg input:disabled,.fg select:disabled{background:#f8fafc;color:var(--text3);cursor:not-allowed;border-style:dashed}
.sec-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;grid-column:1/-1;padding:10px 0 4px;border-top:1px solid var(--border);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:36px;font-size:13px;font-weight:600;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2);transition:all .12s;white-space:nowrap}
.btn:hover{background:#f8fafc}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue2)}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.sm{height:28px;padding:0 10px;font-size:11px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.b-red{background:#fee2e2;color:#991b1b}.b-amber{background:#fef3c7;color:#92400e}.b-green{background:#dcfce7;color:#166534}.b-blue{background:#dbeafe;color:#1e40af}.b-gray{background:#f1f5f9;color:#475569}
.job-item{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:1rem;margin-bottom:.65rem}
.job-item.urgent{border-left:4px solid var(--red)}
.job-item.high{border-left:4px solid var(--amber)}
.job-item.normal{border-left:4px solid var(--blue)}
.sbar{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:11px;color:var(--text2)}
.pbar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;flex:1}
.pfill{height:100%;border-radius:3px}
.jfoot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.edit-panel{background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--r);padding:1rem;margin-top:8px;display:none}
.edit-panel.open{display:block}
.ep-title{font-size:12px;font-weight:700;color:#1e40af;margin-bottom:.85rem;display:flex;justify-content:space-between;align-items:center}
.ep-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.ep-grid{grid-template-columns:1fr}}
.ep-field{display:flex;flex-direction:column;gap:3px}
.ep-field label{font-size:10px;font-weight:700;color:#1e40af}
.ep-field input,.ep-field select,.ep-field textarea{border:1px solid #bfdbfe;border-radius:6px;padding:6px 8px;font-size:12px;background:#fff;color:#1a202c;width:100%}
.ep-field input:disabled,.ep-field select:disabled{background:#f1f5f9;color:#94a3b8;cursor:not-allowed;border-style:dashed}
.ep-field textarea{resize:vertical;min-height:50px;width:100%}
.ep-full{grid-column:1/-1}
.ep-actions{display:flex;gap:8px;margin-top:.85rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:.8rem;text-align:center}
.sv{font-size:22px;font-weight:800;line-height:1}
.sl{font-size:11px;color:var(--text3);margin-top:2px}
.stat.blue .sv{color:var(--blue)}.stat.red .sv{color:var(--red)}.stat.green .sv{color:var(--green)}.stat.amber .sv{color:var(--amber)}
.alert{display:flex;align-items:flex-start;gap:8px;padding:.75rem 1rem;border-radius:var(--r);margin-bottom:.65rem;font-size:13px;line-height:1.5}
.alert.info{background:#dbeafe;border-left:4px solid var(--blue);color:#1e3a8a}
.alert.warn{background:#fef3c7;border-left:4px solid var(--amber);color:#78350f}
.alert.danger{background:#fee2e2;border-left:4px solid var(--red);color:#7f1d1d}
.alert.success{background:#dcfce7;border-left:4px solid var(--green);color:#14532d}
.loader{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:9000;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:.75rem 1.1rem;border-radius:var(--r2);font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:.5rem .75rem;border-bottom:1px solid var(--border);text-align:left;background:#f8fafc}
.tbl td{padding:.55rem .75rem;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
</style>
</head>
<body>
<div id="loader" class="loader"><div class="spinner"></div><div style="font-size:13px;color:var(--text2)">Syncing...</div></div>
<div class="toast" id="toast"></div>

<div class="header">
  <div class="hlogo">
    <div class="hbox">JD</div>
    <div><div class="htitle">JDS Logistics — Employee Portal</div><div class="hsub" id="u-perms">Loading...</div></div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="btn" onclick="loadData()" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3);height:30px;font-size:12px">&#8635; Refresh</button>
    <button class="btn" onclick="logout()" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3);height:30px;font-size:12px">Logout</button>
  </div>
</div>

<div class="who-bar">
  <div class="user-avatar" id="u-avatar">?</div>
  <div>
    <div style="font-weight:700;color:var(--text);font-size:13px" id="u-name">Loading...</div>
    <div style="font-size:10px;color:var(--text3)" id="u-email"></div>
  </div>
  <span style="margin-left:auto;font-size:11px;color:var(--text3)" id="last-sync"></span>
</div>

<div class="tabs" id="tab-bar">
  <button class="tab active" onclick="showTab('myjobs',this)">My Active Jobs</button>
  <button class="tab" id="tab-add-btn" onclick="showTab('addjob',this)" style="display:none">+ Add New Job</button>
  <button class="tab" onclick="showTab('alljobs',this)">All Jobs</button>
  <button class="tab" onclick="showTab('mylog',this)">My Activity</button>
</div>

<div id="tab-myjobs" class="wrap">
  <div id="my-stats" class="stats-row"></div>
  <div id="my-alerts"></div>
  <div id="my-list"></div>
</div>

<div id="tab-addjob" class="wrap" style="display:none">
  <div id="add-job-content"></div>
</div>

<div id="tab-alljobs" class="wrap" style="display:none">
  <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
    <input type="text" placeholder="Search jobs..." id="asearch" oninput="renderAll()" style="border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;flex:1;min-width:160px;font-size:13px">
    <select id="astage" onchange="renderAll()" style="border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;background:#fff;font-size:13px">
      <option value="">All stages</option>
    </select>
  </div>
  <div id="all-list"></div>
</div>

<div id="tab-mylog" class="wrap" style="display:none">
  <div id="log-list"></div>
</div>

<script>
// ===================== CONFIG — PASTE YOUR GOOGLE APPS SCRIPT URL HERE =====================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxp4k4AymyTLKUtFL3GQWyEcppzhoFAxE-KUnNpcFk3YsRNzavBMcA_Q9Dk28wagVKbzw/exec';
// ==========================================================================================

const STAGES = ['Job Created','Documents Received','BL Confirmation','BE Filing','RMS Processing','Assessment','Duty Payment','Examination','OOC Pending','CFS Coordination','Transporter Assigned','Vehicle Out','Delivery Pending','POD Pending','Billing Pending','Payment Collection','Job Closed'];

// ============ PERMISSIONS ============
const FIELD_PERMS = {
  jobNo:         {label:'Job Number',         can:['Uphadhya','Akshyani','Durgesh']},
  client:        {label:'Client Name',        can:['Uphadhya','Akshyani','Durgesh']},
  mode:          {label:'Mode',               can:['Uphadhya','Akshyani','Durgesh']},
  bl:            {label:'BL Number',          can:['Uphadhya','Akshyani','Durgesh']},
  containers:    {label:'Containers',         can:['Uphadhya','Akshyani','Durgesh']},
  vessel:        {label:'Vessel/Flight',       can:['Uphadhya','Akshyani','Durgesh']},
  eta:           {label:'ETA',                can:['Uphadhya','Akshyani','Durgesh']},
  cfs:           {label:'CFS Name',           can:['Uphadhya','Akshyani','Durgesh']},
  be:            {label:'BE Number',          can:['Akshyani','Trupti']},
  hsCode:        {label:'HS Code',            can:['Akshyani','Trupti','Durgesh']},
  rms:           {label:'RMS Status',         can:['Akshyani','Trupti','Durgesh']},
  bgRequired:    {label:'BG Required',        can:['Anil','Akshyani','Durgesh']},
  cfsAmt:        {label:'CFS Amount',         can:['Kiran','Virendra','Mayur','Anil']},
  destination:   {label:'Destination',        can:'all'},
  priority:      {label:'Priority',           can:'all'},
  goods:         {label:'Goods Description',  can:'all'},
  freeDays:      {label:'Free Days',          can:'all'},
  detentionRisk: {label:'Detention Risk',     can:'all'},
  stage:         {label:'Current Stage',      can:['Trupti','Uphadhya']},
  delayReason:   {label:'Delay Reason',       can:'all'},
  notes:         {label:'Notes',              can:'all'},
};

const CAN_CREATE = ['Uphadhya','Akshyani','Durgesh'];

function canEdit(field, user) {
  const p = FIELD_PERMS[field];
  if (!p || p.can === 'all') return true;
  return p.can.includes(user);
}

// ============ STATE ============
let allJobs = [], allLog = [], currentUser = '', currentTab = 'myjobs';

// ============ API ============
async function apiCall(action, data={}) {
  showLoader(true);
  try {
    const res = await fetch(SCRIPT_URL, {
      method:'POST', body:JSON.stringify({action,...data}),
      headers:{'Content-Type':'text/plain'}
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error||'API error');
    return json.data;
  } catch(e) {
    showToast('Connection error: '+e.message, true);
    throw e;
  } finally { showLoader(false); }
}

const API = {
  getJobs:  () => apiCall('getJobs'),
  getLog:   () => apiCall('getLog'),
  upsertJob: (job) => apiCall('upsertJob',{job}),
  addLog:   (entry) => apiCall('addLog',{log:entry}),
};

// ============ INIT ============
window.onload = async () => {
  const sess = sessionStorage.getItem('jds_user');
  if (!sess) { window.location.href = 'index.html'; return; }
  const user = JSON.parse(sess);
  if (user.role === 'admin') { window.location.href = 'jose.html'; return; }
  currentUser = user.name;

  document.getElementById('u-avatar').textContent = currentUser[0].toUpperCase();
  document.getElementById('u-name').textContent = currentUser;
  document.getElementById('u-email').textContent = user.email;

  const canC = CAN_CREATE.includes(currentUser);
  document.getElementById('u-perms').textContent = canC ? '✓ Can create new jobs' : 'View & edit assigned fields only';

  // Show Add New Job tab ONLY for creators
  if (canC) {
    document.getElementById('tab-add-btn').style.display = 'block';
  }

  populateStageFilter();
  await loadData();
};

function logout() { sessionStorage.removeItem('jds_user'); window.location.href = 'index.html'; }

async function loadData() {
  try {
    [allJobs, allLog] = await Promise.all([API.getJobs(), API.getLog()]);
    document.getElementById('last-sync').textContent = 'Synced: ' + new Date().toLocaleTimeString('en-IN');
    renderCurrent();
  } catch(e) { console.error(e); }
}

function showTab(tab, el) {
  // Block non-creators from Add Job tab
  if (tab === 'addjob' && !CAN_CREATE.includes(currentUser)) return;
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  ['myjobs','addjob','alljobs','mylog'].forEach(t => {
    const el2 = document.getElementById('tab-'+t);
    if (el2) el2.style.display = t === tab ? 'block' : 'none';
  });
  renderCurrent();
}

function renderCurrent() {
  if (currentTab === 'myjobs') { renderStats(); renderMyJobs(); }
  else if (currentTab === 'addjob') renderAddJob();
  else if (currentTab === 'alljobs') renderAll();
  else if (currentTab === 'mylog') renderLog();
}

// ============ STATS ============
function renderStats() {
  const mine = allJobs.filter(j => j.assignedTo === currentUser);
  const active = allJobs.filter(j => j.stage < 16).length;
  const urg = allJobs.filter(j => j.priority === 'urgent' && j.stage < 16).length;
  const done = allJobs.filter(j => j.stage >= 16).length;
  const payPend = allJobs.filter(j => j.cfsStatus === 'approved' && j.payStatus === 'pending').length;
  document.getElementById('my-stats').innerHTML = `
    <div class="stat blue"><div class="sv">${active}</div><div class="sl">Total Active Jobs</div></div>
    <div class="stat red"><div class="sv">${urg}</div><div class="sl">Urgent</div></div>
    <div class="stat green"><div class="sv">${done}</div><div class="sl">Completed</div></div>
    <div class="stat amber"><div class="sv">${payPend}</div><div class="sl">Pay Queue</div></div>`;
}

// ============ MY JOBS ============
function renderMyJobs() {
  // Show jobs assigned to me + all active jobs where I have editable fields
  const mine = allJobs.filter(j => j.stage < 16);
  // Sort: assigned to me first, then by priority, then by date
  mine.sort((a,b)=>{
    const myA = a.assignedTo === currentUser ? 0 : 1;
    const myB = b.assignedTo === currentUser ? 0 : 1;
    if (myA !== myB) return myA - myB;
    const p={urgent:0,high:1,normal:2};
    return p[a.priority]-p[b.priority]||b.ts-a.ts;
  });

  const alerts = [];
  mine.forEach(j => {
    if (j.priority === 'urgent') alerts.push({t:'danger',m:`<strong>${j.jobNo}</strong>: URGENT — ${j.delayReason||''}`});
    if (j.detentionRisk === 'high') alerts.push({t:'warn',m:`<strong>${j.jobNo}</strong>: HIGH detention risk. Free days: ${j.freeDays}`});
    if (daysOld(j) > 3 && j.assignedTo === currentUser) alerts.push({t:'info',m:`<strong>${j.jobNo}</strong>: Assigned to you — no update in ${daysOld(j)} days.`});
  });

  const assignedToMe = mine.filter(j => j.assignedTo === currentUser).length;
  document.getElementById('my-alerts').innerHTML = `
    <div class="alert info" style="margin-bottom:.65rem">
      Showing all ${mine.length} active jobs. <strong>${assignedToMe} assigned to you.</strong>
      You can edit your permitted fields on any job — click "Edit My Fields".
    </div>` + alerts.map(a=>`<div class="alert ${a.t}">${a.m}</div>`).join('');
  document.getElementById('my-list').innerHTML = mine.length
    ? mine.map(j => jobCard(j, true)).join('')
    : '<div class="alert success">No active jobs in the system right now.</div>';
}

// ============ ALL JOBS ============
function renderAll() {
  const q = document.getElementById('asearch').value.toLowerCase();
  const st = document.getElementById('astage').value;
  let f = allJobs.filter(j => {
    const mq = !q || [j.jobNo,j.client,j.be,j.bl,j.containers,j.destination,j.assignedTo].some(v=>(v||'').toLowerCase().includes(q));
    return mq && (st===''||j.stage==st);
  });
  f.sort((a,b)=>{const p={urgent:0,high:1,normal:2};return p[a.priority]-p[b.priority]||b.ts-a.ts;});
  document.getElementById('all-list').innerHTML = f.length ? f.map(j=>jobCard(j,true)).join('') : '<div class="empty">No jobs found</div>';
}

function populateStageFilter() {
  const sel = document.getElementById('astage');
  STAGES.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s;sel.appendChild(o);});
}

// ============ LOG ============
function renderLog() {
  const myLog = allLog.filter(a => a.by === currentUser);
  document.getElementById('log-list').innerHTML = myLog.length ? `
  <div class="card"><div class="ch"><div class="ct">My Activity Log</div><span style="font-size:12px;color:var(--text3)">${myLog.length} entries</span></div>
  <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Time</th><th>Job</th><th>Action</th><th>Note</th></tr></thead><tbody>
  ${myLog.slice(0,150).map(a=>`<tr>
    <td style="white-space:nowrap;font-size:11px;color:var(--text3)">${fmtDate(a.ts)}</td>
    <td style="font-weight:700;color:var(--text)">${a.jobNo}</td>
    <td style="color:#1d4ed8">${a.action}</td>
    <td>${a.note||'—'}</td>
  </tr>`).join('')}
  </tbody></table></div></div>` : '<div class="empty">No activity logged yet.</div>';
}

// ============ JOB CARD ============
function jobCard(j, showEdit) {
  const pct = Math.round((j.stage/16)*100);
  const col = j.stage>=16?'#16a34a':j.stage>=10?'#2563eb':j.stage>=5?'#d97706':'#dc2626';

  // Build edit panel fields
  const hasAny = Object.keys(FIELD_PERMS).some(k => canEdit(k, currentUser));
  let epHtml = '';
  if (showEdit) {
    const fields = [
      {k:'jobNo',    label:'Job Number',    type:'text',   val:j.jobNo||''},
      {k:'client',   label:'Client Name',   type:'text',   val:j.client||''},
      {k:'mode',     label:'Mode',          type:'sel',    val:j.mode,     opts:['Sea FCL','Sea LCL','Air','BPT/MBPT']},
      {k:'bl',       label:'BL Number',     type:'text',   val:j.bl||''},
      {k:'containers',label:'Containers',   type:'text',   val:j.containers||''},
      {k:'vessel',   label:'Vessel/Flight',  type:'text',   val:j.vessel||''},
      {k:'eta',      label:'ETA',           type:'date',   val:j.eta||''},
      {k:'cfs',      label:'CFS Name',      type:'text',   val:j.cfs||''},
      {k:'be',       label:'BE Number',     type:'text',   val:j.be||''},
      {k:'cfsAmt',   label:'CFS Amount',    type:'num',    val:j.cfsAmt||0},
      {k:'destination',label:'Destination', type:'text',   val:j.destination||''},
      {k:'priority', label:'Priority',      type:'sel',    val:j.priority, opts:['normal','high','urgent'], labels:['Normal','High','Urgent']},
      {k:'hsCode',   label:'HS Code',       type:'text',   val:j.hsCode||''},
      {k:'goods',    label:'Goods',         type:'text',   val:j.goods||''},
      {k:'rms',      label:'RMS Status',    type:'sel',    val:j.rms,      opts:['pend','rms','apr','acl','check','hold'], labels:['Awaiting','RMS Pass','APR','ACL','First Check','Hold']},
      {k:'bgRequired',label:'BG Required',  type:'sel',    val:j.bgRequired,opts:['no','yes','100'],labels:['No','Yes','100% BG']},
      {k:'freeDays', label:'Free Days',     type:'num',    val:j.freeDays||14},
      {k:'detentionRisk',label:'Detention', type:'sel',    val:j.detentionRisk,opts:['low','medium','high']},
      {k:'stage',    label:'Current Stage', type:'sel',    val:j.stage,    opts:STAGES.map((_,i)=>i), labels:STAGES},
      {k:'delayReason',label:'Delay Reason',type:'text',  val:j.delayReason||'', full:true},
      {k:'notes',    label:'Notes',         type:'area',   val:j.notes||'', full:true},
    ];

    if (hasAny) {
      const rows = fields.map(f => {
        const ok = canEdit(f.k, currentUser);
        const fullClass = f.full ? ' ep-full' : '';
        const lastUpd = (j.fieldMeta && j.fieldMeta[f.k])
          ? `<span style="font-size:9px;color:#64748b;font-weight:400"> · ${j.fieldMeta[f.k].by} ${timeAgo(j.fieldMeta[f.k].ts)}</span>` : '';

        let inp;
        if (!ok) {
          inp = `<input disabled value="${String(f.val).substring(0,45)}" title="Not in your scope">`;
        } else if (f.type === 'sel') {
          const ol = f.labels || f.opts;
          inp = `<select id="ef-${j.id}-${f.k}">${f.opts.map((o,i)=>`<option value="${o}" ${String(o)===String(f.val)||i===Number(f.val)?'selected':''}>${ol[i]||o}</option>`).join('')}</select>`;
        } else if (f.type === 'area') {
          inp = `<textarea id="ef-${j.id}-${f.k}">${f.val}</textarea>`;
        } else {
          inp = `<input type="${f.type==='num'?'number':'text'}" id="ef-${j.id}-${f.k}" value="${f.val}">`;
          if (f.type === 'date') inp = `<input type="date" id="ef-${j.id}-${f.k}" value="${f.val}">`;
        }
        return `<div class="ep-field${fullClass}"><label>${ok?'':'🔒 '}${f.label}${lastUpd}</label>${inp}</div>`;
      }).join('');

      epHtml = `
      <div class="edit-panel" id="ep-${j.id}">
        <div class="ep-title">
          <span>Editing: ${j.jobNo} — ${j.client}</span>
          <span style="font-size:10px;font-weight:400;color:#3b82f6">🔒 = not in your scope</span>
        </div>
        <div class="ep-grid">${rows}</div>
        <div class="ep-actions">
          <button class="btn" onclick="toggleEdit('${j.id}')">Cancel</button>
          <button class="btn success" onclick="submitEdit('${j.id}')">✓ Save My Changes</button>
        </div>
      </div>`;
    }
  }

  return `<div class="job-item ${j.priority}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div style="min-width:0">
        <div style="font-size:15px;font-weight:800;color:var(--text)">${j.jobNo} <span style="font-size:11px;font-weight:400;color:var(--text3)">· ${j.type||'Import'}</span></div>
        <div style="font-size:12px;color:var(--text2);margin-top:1px">${j.client} <span style="color:var(--text3)">· ${j.goods||'—'}</span></div>
        <div style="font-size:11px;color:var(--text3);font-family:monospace;margin-top:2px">${j.be?'BE:'+j.be:''}${j.containers?' · '+j.containers:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
        ${pb(j.priority)} ${mb(j.mode)}
        <span class="badge b-gray" style="font-size:10px">${j.assignedTo||'—'}</span>
      </div>
    </div>
    <div class="sbar">
      <span style="font-size:11px;flex-shrink:0">${STAGES[j.stage]||'—'}</span>
      <div class="pbar"><div class="pfill" style="width:${pct}%;background:${col}"></div></div>
      <span style="font-size:11px;color:var(--text3)">${pct}%</span>
    </div>
    <div class="jfoot">
      <span style="font-size:11px;color:var(--text3)">${j.cfs||'—'} · ${j.destination||'—'} · ${daysOld(j)}d${j.delayReason?' · <span style="color:#d97706">'+j.delayReason+'</span>':''}</span>
      ${showEdit && hasAny ? `<button class="btn sm primary" onclick="toggleEdit('${j.id}')">✎ Edit My Fields</button>` : showEdit ? '<span style="font-size:10px;color:var(--text3)">No fields assigned to you</span>' : ''}
    </div>
    ${epHtml}
  </div>`;
}

function toggleEdit(id) {
  const el = document.getElementById('ep-' + id);
  if (el) el.classList.toggle('open');
}

async function submitEdit(id) {
  const j = allJobs.find(x => x.id === id);
  if (!j) return;

  const fieldMeta = j.fieldMeta ? {...j.fieldMeta} : {};
  const changes = {};
  const now = Date.now();

  Object.keys(FIELD_PERMS).forEach(k => {
    if (!canEdit(k, currentUser)) return;
    const el = document.getElementById(`ef-${id}-${k}`);
    if (!el) return;
    const newVal = (k === 'cfsAmt' || k === 'freeDays' || k === 'stage') ? Number(el.value) : el.value.trim();
    const oldVal = (k === 'cfsAmt' || k === 'freeDays' || k === 'stage') ? Number(j[k]||0) : String(j[k]||'');
    if (String(newVal) !== String(oldVal)) {
      changes[k] = newVal;
      fieldMeta[k] = { by: currentUser, ts: now };
    }
  });

  if (Object.keys(changes).length === 0) {
    showToast('No changes made.');
    toggleEdit(id);
    return;
  }

  const updated = {...j, ...changes, fieldMeta, updatedBy: currentUser, _isNew: false};
  await API.upsertJob(updated);

  const note = Object.entries(changes).map(([k,v]) => `${FIELD_PERMS[k]?.label||k}: ${v}`).join('; ');
  await API.addLog({id:'l'+now, jobId:id, jobNo:j.jobNo, action:'Fields updated', by:currentUser, note});

  showToast(`${j.jobNo} saved! Jose can see your changes.`);
  toggleEdit(id);
  await loadData();
}

function clearNewForm() {
  ['nj','nc','nbl','nbe','ncn','nvs','neta','ncfs','namt','ndest','nown','nhs','ngd','ndl','nnt'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = id === 'namt' ? '0' : id === 'nfd' ? '14' : '';
  });
  ['ntype','nmode','npr','nrms','nbg','ndem'].forEach(id => {
    const el = document.getElementById(id); if (el) el.selectedIndex = 0;
  });
  const es = document.getElementById('nst'); if (es) es.value = '0';
}

async function submitNewJob() {
  if (!CAN_CREATE.includes(currentUser)) { showToast('You are not authorised to create jobs.', true); return; }
  const g = id => { const e = document.getElementById(id); return e ? e.value.trim() : ''; };
  if (!g('nj')) { showToast('Job number is required!', true); return; }
  if (!g('nc')) { showToast('Client name is required!', true); return; }

  const now = Date.now();
  const fieldMeta = {};
  Object.keys(FIELD_PERMS).forEach(k => { fieldMeta[k] = {by: currentUser, ts: now}; });

  const job = {
    id: 'j'+now, ts: now,
    jobNo: g('nj'), client: g('nc'), type: g('ntype'), mode: g('nmode'),
    bl: g('nbl'), be: g('nbe'), containers: g('ncn'), vessel: g('nvs'), eta: g('neta'),
    cfs: g('ncfs'), cfsAmt: Number(g('namt'))||0, destination: g('ndest'),
    assignedTo: g('nown')||currentUser, priority: g('npr'),
    hsCode: g('nhs'), goods: g('ngd'), rms: g('nrms'), bgRequired: g('nbg'),
    freeDays: Number(g('nfd'))||14, detentionRisk: g('ndem'),
    stage: Number(g('nst')), delayReason: g('ndl'), notes: g('nnt'),
    cfsStatus: 'pending', payStatus: 'pending',
    createdBy: currentUser, updatedBy: currentUser, fieldMeta, _isNew: true
  };

  await API.upsertJob(job);
  await API.addLog({id:'l'+now, jobId:job.id, jobNo:job.jobNo, action:'New job created', by:currentUser, note:job.goods||''});
  showToast('Job '+job.jobNo+' created! All employees can see it now.');
  clearNewForm();
  showTab('myjobs', document.querySelector('.tab.active'));
  await loadData();
}

// ============ HELPERS ============
function pb(p){return p==='urgent'?'<span class="badge b-red">Urgent</span>':p==='high'?'<span class="badge b-amber">High</span>':'<span class="badge b-gray">Normal</span>';}
function mb(m){return m==='Air'?'<span class="badge b-green">Air</span>':m==='BPT/MBPT'?'<span class="badge" style="background:#f3e8ff;color:#6b21a8">BPT</span>':m==='Sea LCL'?'<span class="badge" style="background:#ccfbf1;color:#0f766e">LCL</span>':'<span class="badge b-blue">FCL</span>';}
function daysOld(j){return Math.floor((Date.now()-j.ts)/86400000);}
function timeAgo(ts){const d=Math.floor((Date.now()-ts)/1000);if(d<60)return'now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}
function fmtDate(ts){return new Date(ts).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
function showLoader(show){const el=document.getElementById('loader');if(el)el.style.display=show?'flex':'none';}
function showToast(msg,isError){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isError?' error':'');setTimeout(()=>t.className='toast',3500);}
