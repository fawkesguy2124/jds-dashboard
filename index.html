<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDS Logistics</title>
<style>
body{background:#0d1117;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif}
.box{text-align:center;color:#5a6a85}
.spin{width:32px;height:32px;border:3px solid #2a3347;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="spin"></div>
  <div style="font-size:13px">Loading JDS System...</div>
</div>
<script>
// If already logged in, route to right page. Otherwise go to login.
const sess = sessionStorage.getItem('jds_user');
if (sess) {
  const u = JSON.parse(sess);
  window.location.href = u.role === 'admin' ? 'jose.html' : 'employee.html';
} else {
  window.location.href = 'login.html';
}
</script>
</body>
</html>
